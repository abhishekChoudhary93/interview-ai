# Production-oriented stack: external MongoDB, no demo seed, static frontend build.
# Environment: root `.env.production` (use: docker compose --env-file .env.production -f docker-compose.prod.yml up --build -d)
#
# Required in .env.production: MONGODB_URI, JWT_SECRET, JWT_REFRESH_SECRET, FRONTEND_ORIGIN
# Optional: OPENROUTER_API_KEY (if unset, mock LLM), VITE_API_URL, BACKEND_PORT, FRONTEND_HTTP_PORT

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      APP_ENV: production
      PORT: "3001"
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      SEED_ON_START: "false"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?Set FRONTEND_ORIGIN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_CONVERSATIONAL_MODEL: ${OPENROUTER_CONVERSATIONAL_MODEL:-openai/gpt-4o}
      OPENROUTER_OPENING_MODEL: ${OPENROUTER_OPENING_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_EVAL_MODEL: ${OPENROUTER_EVAL_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_DEBRIEF_MODEL: ${OPENROUTER_DEBRIEF_MODEL:-openai/gpt-4o}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"
    depends_on:
      - backend
