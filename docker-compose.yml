services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      APP_ENV: local
      MONGODB_URI: mongodb://mongo:27017/interview_ai
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      SEED_ON_START: "true"
      FRONTEND_ORIGIN: http://localhost:5173
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_CONVERSATIONAL_MODEL: ${OPENROUTER_CONVERSATIONAL_MODEL:-openai/gpt-4o}
      OPENROUTER_OPENING_MODEL: ${OPENROUTER_OPENING_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_EVAL_MODEL: ${OPENROUTER_EVAL_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_DEBRIEF_MODEL: ${OPENROUTER_DEBRIEF_MODEL:-openai/gpt-4o}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-demo@interview-ai.local}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-demo123456}
      INTERVIEW_DEBUG_TRACE: ${INTERVIEW_DEBUG_TRACE:-0}
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_DEBUG_TRACE: ${VITE_DEBUG_TRACE:-0}
    depends_on:
      - backend

volumes:
  mongo_data:
